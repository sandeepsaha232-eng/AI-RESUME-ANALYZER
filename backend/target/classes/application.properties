spring.application.name=elevate-resume-backend
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:elevate;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
app.supabase.url=${SUPABASE_URL:}
app.supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:}
app.groq.api-key=${GROQ_API_KEY:}
app.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
spring.mvc.pathmatch.matching-strategy=ant_path_matcher